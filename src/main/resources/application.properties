# =========================
# MySQL datasource (Demo)
# =========================
# Bạn có thể đổi các biến môi trường để không hard-code vào file:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:techstore_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:techstore_user}
spring.datasource.password=${DB_PASS:Techstore@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
# update: giữ dữ liệu giữa các lần chạy
# create-drop: mỗi lần stop app sẽ drop bảng (demo reset)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# H2 console (tắt vì dùng MySQL)
# =========================
spring.h2.console.enabled=false

# =========================
# Seed demo data
# =========================
app.seed.demo=true

# Dummy key for dev
sendgrid.api-key=dummy-key-for-dev
