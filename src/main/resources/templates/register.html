<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Register - TechStore</title>

  <!-- CSS -->
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">

  <!-- Custom Style -->
  <style>
    body.register-page {
        background: linear-gradient(135deg, #0d6efd 0%, #1b1f3b 100%);
        font-family: 'Roboto', sans-serif;
    }

    .register-box {
        background: #fff;
        padding: 35px 35px;
        border-radius: 18px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.18);
        animation: fadeIn 0.6s ease;
    }

    .page-title h1 {
        font-weight: 700;
        color: #fff;
    }

    .page-title p {
        color: #e2e6ea;
    }

    .form-floating > .form-control {
        border-radius: 12px;
        padding: 14px 15px;
    }

    .btn-submit {
        padding: 12px;
        font-size: 17px;
        border-radius: 12px;
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        border: none;
        color: white;
        transition: 0.25s ease;
    }

    .btn-submit:hover {
        background: linear-gradient(135deg, #0a58ca, #084298);
        transform: translateY(-2px);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .footer {
        background: #00000033;
    }
  </style>
</head>

<body class="register-page">

<!-- ======= Main ======= -->
<main class="main d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <!-- Title -->
        <div class="text-center mb-4">
          <h1 class="text-white">Create Account</h1>
          <p class="text-light">Join TechStore and start shopping today!</p>
        </div>

        <!-- Register Container -->
        <div class="register-box">

          <form th:action="@{/auth/register}" method="post">

            <!-- Full Name -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Full Name" required>
              <label for="fullName">Full Name</label>
            </div>

            <!-- Username -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
              <label for="username">Username</label>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
              <label for="email">Email Address</label>
            </div>

            <!-- Password -->
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="password" name="password" placeholder="Password" required minlength="6">
              <label for="password">Password</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit w-100 mb-3">
              Create Account
            </button>

            <!-- Message -->
            <p class="text-center fw-bold text-success" th:text="${message}"></p>

            <!-- Redirect Link -->
            <p class="text-center mt-2">
              Already have an account?
              <a th:href="@{/login}" class="fw-semibold">Sign in here</a>
            </p>
          </form>

        </div>

      </div>
    </div>
  </div>
</main>

<!-- ======= Footer ======= -->
<footer class="footer text-center text-white py-3">
  © 2025 TechStore. All Rights Reserved.
</footer>

<!-- JS -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/aos.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
