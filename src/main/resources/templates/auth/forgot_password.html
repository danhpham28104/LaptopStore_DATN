<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .box {
          max-width: 420px;
          margin: 80px auto;
          background: #fff;
          padding: 30px;
          border-radius: 12px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-tech {
          background: #2563eb;
          color: #fff;
          border-radius: 8px;
          font-weight: 600;
        }
        .btn-tech:hover { opacity: 0.9; }
    </style>
</head>

<body>

<div class="box">
    <h4 class="text-center fw-bold mb-3">🔐 Quên mật khẩu</h4>
    <p class="text-center text-muted">Nhập email của bạn để nhận mã khôi phục</p>

    <form method="post" action="/forgot-password">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@gmail.com" required>
        </div>

        <button class="btn btn-tech w-100 mt-3">Gửi mã khôi phục</button>

        <p class="text-danger mt-3 text-center" th:text="${error}"></p>

        <div class="text-center mt-3">
            <a href="/login">← Quay lại đăng nhập</a>
        </div>
    </form>
</div>
<p class="text-success mt-3 text-center" th:text="${success}"></p>


</body>
</html>
