<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận mã - TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .box {
          max-width: 420px;
          margin: 80px auto;
          background: #fff;
          padding: 30px;
          border-radius: 12px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-tech {
          background: #2563eb;
          color: #fff;
          border-radius: 8px;
          font-weight: 600;
        }
    </style>
</head>

<body>

<div class="box">
    <h4 class="text-center fw-bold mb-3">📩 Nhập mã xác nhận</h4>
    <p class="text-center text-muted">Một mã 6 số đã gửi tới email của bạn.</p>

    <form method="post" action="/verify-code">
        <input type="hidden" name="email" th:value="${email}">

        <div class="mb-3">
            <label class="form-label">Mã xác nhận</label>
            <input type="text" maxlength="6" name="code" class="form-control text-center fs-4"
                   placeholder="••••••" required>
        </div>

        <button class="btn btn-tech w-100 mt-3">Xác nhận</button>

        <div class="text-center mt-3">
            <a href="/forgot-password">← Gửi lại mã</a>
        </div>

    </form>
</div>
<p class="text-danger text-center" th:text="${error}"></p>

</body>
</html>
