<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng thành công – TechStore</title>

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/bootstrap-icons.css}" rel="stylesheet">
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">

  <style>
    .success-container {
        max-width: 650px;
        margin: 60px auto;
        text-align: center;
        padding: 40px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .success-icon {
        font-size: 70px;
        color: #28a745;
    }
    .btn-home {
        margin-top: 25px;
    }
  </style>
</head>

<body>

<div th:replace="fragments/header :: siteHeader"></div>

<main>
  <div class="container">
    <div class="success-container" data-aos="zoom-in">

      <i class="bi bi-check-circle-fill success-icon"></i>

      <h2 class="mt-3 fw-bold text-success">Đặt hàng thành công!</h2>

      <p class="mt-3">
        Cảm ơn bạn đã mua hàng tại <strong>TechStore</strong>.<br>
        Chúng tôi sẽ liên hệ để xác nhận đơn hàng trong thời gian sớm nhất.
      </p>

      <a th:href="@{/orders}" class="btn btn-primary btn-lg w-100 mt-3">
        Xem đơn hàng của tôi
      </a>

      <a th:href="@{/}" class="btn btn-outline-secondary w-100 btn-home">
        Quay về trang chủ
      </a>
    </div>
  </div>
</main>

<div th:replace="fragments/footer :: siteFooter"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
