<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Tài khoản - TechStore</title>

  <!-- Favicons -->
  <link th:href="@{/images/favicon.png}" rel="icon">
  <link th:href="@{/images/apple-touch-icon.png}" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon & Vendor CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/swiper-bundle.min.css}" rel="stylesheet">
  <link th:href="@{/css/aos.css}" rel="stylesheet">
  <link th:href="@{/css/glightbox.min.css}" rel="stylesheet">

  <!-- Main Styles -->
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="account-page">

<!-- HEADER -->
<div th:replace="fragments/header :: siteHeader"></div>

<main class="main">

  <!-- Page Title -->
  <div class="page-title light-background">
    <div class="container d-lg-flex justify-content-between align-items-center">
      <h1 class="mb-2 mb-lg-0">Tài khoản</h1>

      <nav class="breadcrumbs">
        <ol>
          <li><a th:href="@{/}">Trang chủ</a></li>
          <li class="current" th:text="${user.fullName}">Tên người dùng</li>
        </ol>
      </nav>
    </div>
  </div>

  <!-- Account Section -->
  <section id="account" class="account section">
    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row g-4">

        <!-- LEFT MENU -->
        <div class="col-lg-3">
          <div class="profile-menu collapse d-lg-block" id="profileMenu">

            <!-- User Info -->
            <div class="user-info">
              <div class="user-avatar">
                <img th:src="@{/images/default-avatar.png}" alt="Profile">
                <span class="status-badge">
                  <i class="bi bi-shield-check"></i>
                </span>
              </div>

              <h4 th:text="${user.fullName}">User Name</h4>

              <div class="user-status">
                <i class="bi bi-envelope"></i>
                <span th:text="${user.email}"></span>
              </div>

              <div class="user-status">
                <i class="bi bi-telephone"></i>
                <span th:text="${user.phone}"></span>
              </div>
            </div>

            <!-- Navigation -->
            <nav class="menu-nav mt-4">
              <ul class="nav flex-column" role="tablist">

                <!-- 🟩 CÀI ĐẶT → ĐƯA LÊN TRƯỚC -->
                <li class="nav-item">
                  <a class="nav-link active" data-bs-toggle="tab" href="#settings">
                    <i class="bi bi-gear"></i> <span>Cài đặt tài khoản</span>
                  </a>
                </li>

                <!-- 🟦 ĐỊA CHỈ – xuống dưới -->
                <li class="nav-item">
                  <a class="nav-link" data-bs-toggle="tab" href="#addresses">
                    <i class="bi bi-geo-alt"></i> <span>Địa chỉ</span>
                  </a>
                </li>

              </ul>

              <div class="menu-footer mt-4">
                <form th:action="@{/logout}" method="post">
                  <button type="submit" class="btn btn-outline-danger w-100">
                    <i class="bi bi-box-arrow-right"></i> Đăng xuất
                  </button>
                </form>
              </div>
            </nav>

          </div>
        </div>

        <!-- RIGHT CONTENT -->
        <div class="col-lg-9">
          <div class="content-area">
            <div class="tab-content">

              <!-- 🔥 SETTINGS TAB — ĐƯỢC CHO LÊN ĐẦU & ACTIVE -->
              <div class="tab-pane fade show active" id="settings">

                <div class="section-header" data-aos="fade-up">
                  <h2>Cài đặt tài khoản</h2>
                </div>

                <!-- Update Profile -->
                <form th:action="@{/user/update}" method="post"
                      class="border p-3 rounded bg-light mb-4">

                  <input type="hidden" name="id" th:value="${user.id}">

                  <div class="row g-3">

                    <div class="col-md-4">
                      <label class="form-label fw-semibold">Họ và tên</label>
                      <input type="text" name="fullName" th:value="${user.fullName}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                      <label class="form-label fw-semibold">Email</label>
                      <input type="email" name="email" th:value="${user.email}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                      <label class="form-label fw-semibold">Số điện thoại</label>
                      <input type="text" name="phone" th:value="${user.phone}" class="form-control" required>
                    </div>

                    <div class="col-12 text-end">
                      <button type="submit" class="btn btn-success px-4 mt-2">
                        <i class="bi bi-save"></i> Lưu thay đổi
                      </button>
                    </div>

                  </div>
                </form>

                <!-- Change Password -->
                <form th:action="@{/user/account/change-password}" method="post"
                      class="border p-3 rounded bg-light">

                  <div class="row g-3">

                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                      <input type="password" name="oldPassword" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Mật khẩu mới</label>
                      <input type="password" name="newPassword" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                      <input type="password" name="confirmPassword" class="form-control" required>
                    </div>

                    <div class="col-12 text-end">
                      <button type="submit" class="btn btn-primary px-4 mt-3">
                        <i class="bi bi-key"></i> Đổi mật khẩu
                      </button>
                    </div>

                  </div>

                  <div class="mt-3">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                  </div>

                </form>

              </div>
              <!-- END SETTINGS -->


              <!-- 📌 ADDRESSES TAB — CHUYỂN XUỐNG SAU -->
              <div class="tab-pane fade" id="addresses">

                <div class="section-header">
                  <h2>Địa chỉ của tôi</h2>

                  <button type="button" class="btn-add-new"
                          data-bs-toggle="collapse"
                          data-bs-target="#addAddressForm">
                    <i class="bi bi-plus-lg"></i> Thêm địa chỉ mới
                  </button>
                </div>

                <!-- Add New Address Form -->
                <div class="collapse mb-4" id="addAddressForm">
                  <form th:action="@{/user/account/add-address}"
                        th:object="${newAddress}"
                        method="post"
                        class="border p-3 rounded bg-light">

                    <div class="row g-3">

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Họ và tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required>
                      </div>

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control" required>
                      </div>

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Địa chỉ</label>
                        <input type="text" th:field="*{addressLine}" class="form-control" required>
                      </div>

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Phường / Xã</label>
                        <input type="text" th:field="*{ward}" class="form-control">
                      </div>

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Quận / Huyện</label>
                        <input type="text" th:field="*{district}" class="form-control">
                      </div>

                      <div class="col-md-4">
                        <label class="form-label fw-semibold">Tỉnh / Thành phố</label>
                        <input type="text" th:field="*{city}" class="form-control">
                      </div>

                      <div class="col-md-6 form-check mt-2">
                        <input type="checkbox" th:field="*{default}" class="form-check-input" id="defaultAddress">
                        <label class="form-check-label" for="defaultAddress">Đặt làm mặc định</label>
                      </div>

                      <div class="col-md-6 text-end">
                        <button type="submit" class="btn btn-primary px-4">Lưu địa chỉ</button>
                      </div>

                    </div>
                  </form>
                </div>

                <!-- Address List -->
                <div class="addresses-grid mt-4">

                  <div class="address-card"
                       th:each="addr : ${addresses}"
                       th:classappend="${addr.default} ? ' default' : ''">

                    <div class="card-header d-flex justify-content-between align-items-center">
                      <h5 class="mb-0 fw-bold" th:text="${addr.fullName}"></h5>
                      <span class="badge bg-success" th:if="${addr.default}">Default</span>
                    </div>

                    <div class="card-body">
                      <p class="mb-1">
                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${addr.addressLine} + ', ' + ${addr.ward} + ', ' + ${addr.district} + ', ' + ${addr.city}"></span>
                      </p>

                      <p class="mb-0">
                        <i class="bi bi-telephone"></i>
                        <span th:text="${addr.phone}"></span>
                      </p>
                    </div>

                    <div class="card-footer d-flex justify-content-between">
                      <a th:href="@{'/user/account/delete-address/' + ${addr.id}}"
                         class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i> Xóa
                      </a>

                      <a th:if="${!addr.default}"
                         th:href="@{'/account/make-default/' + ${addr.id}}"
                         class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-check2-circle"></i> Đặt mặc định
                      </a>
                    </div>

                  </div>

                  <div th:if="${#lists.isEmpty(addresses)}"
                       class="text-muted text-center mt-3">
                    Bạn chưa có địa chỉ nào được lưu.
                  </div>

                </div>

              </div>
              <!-- END ADDRESSES -->

            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<!-- Scroll Top -->
<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center">
  <i class="bi bi-arrow-up-short"></i>
</a>

<!-- FOOTER -->
<div th:replace="fragments/footer :: siteFooter"></div>

<!-- JS Files -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/swiper-bundle.min.js}"></script>
<script th:src="@{/js/aos.js}"></script>
<script th:src="@{/js/glightbox.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
