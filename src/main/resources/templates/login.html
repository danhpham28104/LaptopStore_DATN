<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login - TechStore</title>

    <!-- Favicons -->
    <link th:href="@{/img/favicon.png}" rel="icon">
    <link th:href="@{/img/apple-touch-icon.png}" rel="apple-touch-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Vendor CSS Files -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/swiper-bundle.min.css}" rel="stylesheet">
    <link th:href="@{/css/aos.css}" rel="stylesheet">
    <link th:href="@{/css/glightbox.min.css}" rel="stylesheet">
    <link th:href="@{/css/drift-basic.css}" rel="stylesheet">

    <!-- Main CSS File -->
    <link th:href="@{/css/main.css}" rel="stylesheet">

    <!-- ========== CUSTOM STYLE FOR LOGIN ========== -->
    <style>
        body.login-page {
            background: linear-gradient(135deg, #0d6efd 0%, #1b1f3b 100%);
            font-family: 'Roboto', sans-serif;
        }

        .auth-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            animation: fadeIn 0.7s ease;
        }

        .form-header h3 {
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 5px;
        }

        .input-group {
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .input-group .form-control {
            border: none;
            padding: 12px 15px;
        }

        .input-icon {
            background: #f1f3f5;
            padding: 12px 14px;
            color: #6c757d;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            font-size: 17px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            border: none;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: linear-gradient(135deg, #0a58ca, #073ea1);
            transform: translateY(-2px);
        }

        .switch-form a, .forgot a {
            font-weight: 600;
            color: #0d6efd;
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="login-page">

<!-- ===== Main Content ===== -->
<main class="main">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-5 col-md-7 col-sm-10">
            <div class="auth-container">

                <div class="form-header text-center mb-4">
                    <h3>Welcome Back 👋</h3>
                    <p>Please sign in to continue</p>
                </div>

                <p th:if="${success}" class="text-success text-center" th:text="${success}"></p>

                <!-- Login Form -->
                <form th:action="@{/auth/login}" method="post">

                    <div class="input-group mb-3">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>

                    <div class="input-group mb-1">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <!-- ⭐ Thêm dòng "Forgot password?" -->
                    <div class="forgot text-end mb-3">
                        <a th:href="@{/forgot-password}">Forgot your password?</a>
                    </div>

                    <button type="submit" class="auth-btn mb-3">
                        Sign In <i class="bi bi-arrow-right"></i>
                    </button>

                    <p th:if="${param.error}" class="text-danger text-center">Sai tài khoản hoặc mật khẩu!</p>
                    <p th:if="${param.logout}" class="text-success text-center">Bạn đã đăng xuất thành công!</p>

                    <div class="switch-form text-center mt-3">
                        <span>Don’t have an account?</span>
                        <a th:href="@{/register}">Create account</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</main>

</body>
</html>
