<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h3 class="mb-3">Thanh toán đơn hàng <span class="text-primary" th:text="${order.orderCode}"></span></h3>
    <p>Số tiền cần thanh toán:</p>
    <h2 class="text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></h2>

    <img th:src="${qrUrl}" alt="QR thanh toán" class="img-fluid mt-3" width="320">

    <p class="mt-3">Quét QR bằng App MBBank, Vietcombank, Vietin, BIDV, v.v...</p>

    <div class="alert alert-warning mt-4">
        Sau khi thanh toán, hệ thống sẽ tự động cập nhật trạng thái đơn hàng!
    </div>

</div>

</body>
</html>
