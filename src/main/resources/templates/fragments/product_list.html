<!-- ✅ templates/fragments/product_list.html -->
<!--
  Fragment chỉ render *các card sản phẩm* (cột),
  để JS có thể replace innerHTML của #product-list (row) mà không bị lồng row/div.
-->

<th:block th:fragment="productList" xmlns:th="http://www.thymeleaf.org">
  <div class="col-lg-3 col-md-6" th:each="p : ${products}">
    <div class="product-item">

      <div class="product-image">

        <!-- HOT -->
        <span class="my-badge badge-hot"
              th:if="${p.badge != null and p.badge.equalsIgnoreCase('HOT')}">
            <i class="bi bi-fire"></i> HOT
        </span>

        <!-- NEW -->
        <span class="my-badge badge-new"
              th:if="${p.createdAt != null and p.createdAt.isAfter(T(java.time.LocalDateTime).now().minusDays(7))}">
            <i class="bi bi-stars"></i> NEW
        </span>

        <!-- LIMITED -->
        <span class="my-badge badge-limited"
              th:if="${p.stock < 10}">
            <i class="bi bi-exclamation-triangle-fill"></i> LIMITED
        </span>

        <img th:if="${p.images != null}" th:src="${#strings.arraySplit(p.images, ',')[0]}" class="img-fluid" loading="lazy">
        <img th:if="${p.images == null}" th:src="@{/images/default-avatar.png}" class="img-fluid" loading="lazy" alt="Laptop">
      </div>


      <div class="product-info">
        <div class="product-category" th:text="${p.brand != null ? p.brand.name : 'Hãng'}">Hãng</div>

        <h4 class="product-name">
          <a th:href="@{'/product/' + ${p.id}}" th:text="${p.name}">Tên laptop</a>
          <!-- SALE % -->
          <span class="sale-badge" th:if="${p.salePercent != null and p.salePercent > 0}">
              -[[${p.salePercent}]]%
          </span>
        </h4>

        <!-- Tags nhanh: CPU / RAM / SSD -->
        <div class="display-tags mb-3">
          <span class="spec-tag" th:if="${p.cpu != null and !p.cpu.isBlank()}" th:text="${p.cpu}"></span>
          <span class="spec-tag" th:if="${p.ram != null and !p.ram.isBlank()}" th:text="${p.ram}"></span>

          <!-- SSD lấy từ biến thể đầu tiên (nếu có) -->
          <span class="spec-tag"
                th:if="${!#lists.isEmpty(p.variants)}"
                th:text="${p.variants[0].storage}">
          </span>

          <!-- GPU chỉ hiện khi có -->
          <span class="spec-tag" th:if="${p.gpu != null and !p.gpu.isBlank()}" th:text="${p.gpu}"></span>
        </div>

        <div class="product-price">
          <!-- Giá sau giảm -->
          <span class="price-final"
                th:text="${#numbers.formatDecimal(p.price * (100 - p.salePercent) / 100, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
          </span>

          <!-- Giá gốc (gạch ngang) -->
          <span class="price-old"
                th:if="${p.salePercent > 0}"
                th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
          </span>
        </div>


        <div class="buy-now mt-2 text-center">
          <a th:href="@{'/product/' + ${p.id}}"
             class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-lightning-charge-fill me-1"></i> Xem chi tiết
          </a>
        </div>
      </div>

    </div>
  </div>
</th:block>
