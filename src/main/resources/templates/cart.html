  <!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title th:text="${pageTitle} ?: 'Giỏ hàng – LaptopStore'">Giỏ hàng – LaptopStore</title>

  <!-- Vendor CSS Files -->
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/bootstrap-icons.css}" rel="stylesheet">
  <link th:href="@{/css/swiper-bundle.min.css}" rel="stylesheet">
  <link th:href="@{/css/aos.css}" rel="stylesheet">
  <link th:href="@{/css/glightbox.min.css}" rel="stylesheet">
  <link th:href="@{/css/drift-basic.css}" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="cart-page">
<div th:replace = "fragments/header :: siteHeader"></div>

<main class="main mt-4">
  <div class="container" th:with="items=${cart != null && cart.items != null ? cart.items : #lists.emptyList()}">

    <h2 class="mb-4">Giỏ hàng của bạn</h2>

    <!-- Nếu giỏ hàng trống -->
    <div class="alert alert-secondary" th:if="${#lists.isEmpty(items)}">
      Chưa có sản phẩm nào trong giỏ hàng.
    </div>

    <!-- Danh sách sản phẩm -->
    <div th:each="item : ${items}" class="border-bottom py-3">
      <div class="row align-items-center">

        <!-- Hình ảnh -->
        <div class="col-md-2 text-center">
          <img th:src="${item.variant != null ? item.variant.image : item.product.images.split(',')[0]}"
               th:alt="${item.product != null ? item.product.name : 'Sản phẩm'}"
               class="img-fluid rounded"
               style="width:80px; height:80px; object-fit:cover;">


        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-4">
          <h6 th:text="${item.product.name}">Tên sản phẩm</h6>

          <!-- Nếu có biến thể -->
          <div th:if="${item.variant != null}" class="text-muted small">
            <span th:text="'Màu: ' + ${item.variant.color}"></span> •
            <span th:text="'SSD: ' + ${item.variant.storage}"></span>
          </div>

        </div>

        <!-- Giá -->
        <div class="col-md-2 text-center">
          <span th:if="${item.variant != null and item.product != null}"
                th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
          <span th:unless="${item.variant != null and item.product != null}">0 ₫</span>
        </div>

        <!-- Số lượng -->
        <div class="col-md-2 text-center">
          <form th:action="@{/cart/update}" method="post" class="d-inline-flex align-items-center justify-content-center">
            <input type="hidden" name="itemId" th:value="${item.id}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-secondary btn-sm" name="action" value="decrease" type="submit">
              <i class="bi bi-dash"></i>
            </button>
            <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                   class="form-control mx-1 text-center" style="width:60px;">
            <button class="btn btn-outline-secondary btn-sm" name="action" value="increase" type="submit">
              <i class="bi bi-plus"></i>
            </button>
          </form>
        </div>

        <div class="col-md-2 text-center">
          <span
            th:if="${item.product != null}"
          th:text="${#numbers.formatDecimal(item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity * 1L)), 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
        </div>
        <div class="col-md-2 text-center">
          <form th:action="@{/cart/remove}" method="post" class="mt-1 delete-item-form">
            <input type="hidden" name="itemId" th:value="${item.id}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="button" class="btn btn-link text-danger p-0 delete-item-btn">
              <i class="bi bi-trash"></i> Xóa
            </button>
          </form>

        </div>

      </div>
    </div>

    <!-- Xóa toàn bộ -->
    <div class="text-end mt-3" th:if="${!#lists.isEmpty(items)}">
      <form th:action="@{/cart/clear}" method="post" class="delete-all-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="button" class="btn btn-outline-danger delete-all-btn">
          <i class="bi bi-trash"></i> Xóa tất cả
        </button>
      </form>

    </div>

    <!-- Tổng kết -->
    <div class="cart-summary border rounded mt-4 p-4" th:if="${!#lists.isEmpty(items)}">
      <h4 class="mb-3">Tổng kết đơn hàng</h4>

      <div class="d-flex justify-content-between mb-2">
        <span>Tạm tính</span>
        <span th:text="${#numbers.formatDecimal(cart.subtotal,0,'COMMA',0,'POINT')} + ' ₫'">0 ₫</span>
      </div>

      <div class="d-flex justify-content-between mb-2">
        <span>Giảm giá</span>
        <span th:text="${#numbers.formatDecimal(cart.discount,0,'COMMA',0,'POINT')} + ' ₫'">0 ₫</span>
      </div>

      <hr>

      <div class="d-flex justify-content-between fw-bold">
        <span>Tổng cộng</span>
        <span th:text="${#numbers.formatDecimal(cart.total,0,'COMMA',0,'POINT')} + ' ₫'">0 ₫</span>
      </div>

      <div class="mt-3">
        <a th:href="@{/checkout}" class="btn btn-primary w-100">Thanh toán</a>
      </div>
    </div>

  </div>
</main>

<footer class="text-center py-3 border-top mt-4">
  <p>© <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2025</span> LaptopStore</p>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // Xóa 1 sản phẩm
  document.querySelectorAll(".delete-item-btn").forEach(btn => {
      btn.addEventListener("click", function () {
          let form = this.closest(".delete-item-form");

          Swal.fire({
              title: "Xóa sản phẩm?",
              text: "Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?",
              icon: "warning",
              showCancelButton: true,
              confirmButtonColor: "#d33",
              cancelButtonColor: "#3085d6",
              confirmButtonText: "Xóa",
              cancelButtonText: "Hủy"
          }).then((result) => {
              if (result.isConfirmed) {
                  form.submit();
              }
          });
      });
  });

  // Xóa tất cả sản phẩm
  document.querySelector(".delete-all-btn")?.addEventListener("click", function () {
      let form = document.querySelector(".delete-all-form");

      Swal.fire({
          title: "Xóa toàn bộ giỏ hàng?",
          text: "Bạn sẽ không thể hoàn tác hành động này!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#d33",
          cancelButtonColor: "#3085d6",
          confirmButtonText: "Xóa tất cả",
          cancelButtonText: "Hủy"
      }).then((result) => {
          if (result.isConfirmed) {
              form.submit();
          }
      });
  });
</script>

</body>
</html>
